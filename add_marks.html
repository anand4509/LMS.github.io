{% extends "base.html" %}
{% block title %}Add Marks{% endblock %}
{% block content %}
<section class="panel">
    <h1>Add Marks</h1>
    <form method="post" class="form">
        <label for="course_id">Course</label>
        <select id="course_id" name="course_id" required>
            <option value="">Select course</option>
            {% for course in courses %}
                <option value="{{ course.id }}">{{ course.title }}</option>
            {% endfor %}
        </select>

        <label for="student_id">Student</label>
        <select id="student_id" name="student_id" required>
            <option value="">Select student</option>
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }} ({{ student.email }})</option>
            {% endfor %}
        </select>

        <label for="marks">Marks obtained</label>
        <input id="marks" name="marks" type="number" step="0.01" min="0" required>

        <label for="total_marks">Total marks</label>
        <input id="total_marks" name="total_marks" type="number" step="0.01" min="1" required>

        <label for="remarks">Remarks</label>
        <textarea id="remarks" name="remarks" rows="4"></textarea>

        <button type="submit">Save Marks</button>
    </form>
</section>
{% endblock %}
