{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-panel">
    <h1>Login</h1>
    <form method="post" class="form">
        <label for="login_id">Username or Email</label>
        <input id="login_id" name="login_id" type="text" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Login</button>
    </form>
    <p class="small-link">Need an account? <a href="{{ url_for('register') }}">Register here</a>.</p>
    <p class="small-link">Forgot password? <a href="{{ url_for('forgot_password') }}">Reset it here</a>.</p>
</section>
{% endblock %}
